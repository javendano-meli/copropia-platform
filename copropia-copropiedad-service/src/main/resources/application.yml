server:
  port: 8082

spring:
  application:
    name: copropiedad-service
  datasource:
    url: jdbc:postgresql://localhost:5434/copropia_copropiedad
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
