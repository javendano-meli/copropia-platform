spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

jwt:
  secret: test-secret-key-minimum-32-characters-long-for-hmac-sha
  expiration: 3600000

eureka:
  client:
    enabled: false
